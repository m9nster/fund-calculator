<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>基金持仓 & 补仓计算器（完整版）</title>
<style>
* {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
}
body {
    margin: 0;
    padding: 20px;
    background: #f7f8fa;
    color: #222;
}
.container {
    max-width: 900px;
    margin: 0 auto;
}
.card {
    background: #fff;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}
h1 {
    font-size: 24px;
    margin: 0 0 16px;
}
h2 {
    font-size: 18px;
    margin: 0 0 14px;
}
textarea {
    width: 100%;
    height: 160px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    resize: vertical;
}
button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #007aff;
    color: #fff;
    font-weight: 500;
    cursor: pointer;
    margin-right: 8px;
    margin-top: 8px;
}
button.secondary {
    background: #e5efff;
    color: #0066cc;
}
input {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 120px;
    font-size:14px;
}

/* 折叠面板 */
.collapse-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}
.collapse-header::after {
    content: '▼';
    font-size: 12px;
    color: #888;
    transition: transform 0.2s;
}
.collapse-header.collapsed::after {
    transform: rotate(-90deg);
}
.collapse-body {
    overflow: hidden;
    max-height: 1000px;
    transition: max-height 0.3s ease;
}
.collapse-body.collapsed {
    max-height: 0;
}

/* === 极致整齐对齐布局 === */
.fund-card {
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid #eee;
    font-size: 14px;
    transition: all 0.2s ease;
}
/* 收起状态：只精简内边距，保留边框和背景 */
.fund-card.fund-collapsed {
    padding: 0;
    background: #fff;
    border: 1px solid #eee;
}

.fund-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s ease;
}
/* 收起状态：标题无底线、紧凑内边距 */
.fund-collapsed .fund-title {
    border-bottom: none !important;
    padding: 10px 16px;
    margin: 0;
}

/* 基金卡片折叠按钮样式 */
.fund-collapse-btn {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    background: #f0f5ff;
    color: #0066cc;
    cursor: pointer;
    border: none;
    margin: 0;
}

/* 基金卡片内容区域折叠样式 */
.fund-content {
    overflow: hidden;
    max-height: 2000px;
    transition: max-height 0.3s ease;
}
.fund-content.collapsed {
    max-height: 0;
}

/* 统一标签宽度 + 严格对齐 */
.item {
    display: flex;
    padding: 6px 0;
}
.label {
    width: 100px;
    color: #666;
    flex-shrink: 0;
    font-weight: 400;
}
.value {
    flex: 1;
    text-align: right;
    font-weight: 500;
    color: #222;
}

/* 两列布局 + 中间竖线分隔 */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    position: relative;
}
.grid > div:nth-child(odd) {
    border-right: 1px solid #f0f0f0;
    padding-right: 12px;
}

.input-item {
    display: flex;
    align-items: center;
    padding: 8px 0;
}
.input-item .label {
    width: 100px;
    color: #666;
}

/* ✅ 正确A股配色：涨红 跌绿 */
.positive { color: #e63946; font-weight: 500; }
.negative { color: #009955; font-weight: 500; }

/* ========== 总计栏样式 ========== */
.total-card {
    background: #fff;
    border: 1px solid #cce5ff;
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 14px;
}
.total-title {
    font-size: 15px;
    font-weight: 600;
    color: #0066cc;
    margin-bottom: 8px;
}

/* 排序按钮区域 */
.sort-bar {
    margin: 10px 0;
}
</style>
</head>
<body>
<div class="container">
    <h1>基金持仓 & 补仓计算器</h1>

    <div class="card">
        <div class="collapse-header" onclick="toggleImport()">
            <h2 style="margin:0">导入基金（粘贴覆盖）</h2>
        </div>
        <div class="collapse-body" id="importBody">
            <textarea id="importText" placeholder="格式1（含实时估值）：基金代码 基金名称 持仓金额 持仓收益 昨日净值 实时估值(%)
格式2（旧版）：基金代码 基金名称 持仓金额 持仓收益 昨日净值
支持TAB / 空格 / 逗号分隔
支持名称带空格，自动识别，绝不错乱" style="margin-top:14px"></textarea>
            <div>
                <button onclick="importFunds()">导入并覆盖全部基金</button>
                <button class="secondary" onclick="exportFunds()">导出数据</button>
            </div>
        </div>
    </div>

    <div id="fundList" style="display:none; margin-top:20px">
        <h2>持仓明细</h2>
        
        <!-- 排序按钮 -->
        <div class="sort-bar">
            <button class="secondary" onclick="sortByName()">按基金名称升序</button>
            <button class="secondary" onclick="sortByRtDesc()">按实时估值倒序</button>
        </div>

        <div id="fundContainer"></div>
        <div id="totalContainer"></div>
    </div>
</div>

<script>
const STORAGE_KEY = "fund_calc_local_final";
// 初始化数据
let fundList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
fundList.forEach(fund => {
    if (fund.collapsed === undefined) fund.collapsed = false;
    if (fund.rt === undefined) fund.rt = "";
});

// 回车确认计算
function updateAndRender() {
    saveFunds();
    renderFunds();
    renderTotal();
}

function saveFunds() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(fundList));
}

// 导出数据
function exportFunds() {
    let lines = ["基金代码,基金名称,持仓金额,持仓收益,昨日净值,实时估值(%)"];
    fundList.forEach(f => {
        lines.push(`${f.code},${f.name},${f.amount.toFixed(2)},${f.income.toFixed(2)},${f.lastNet||""},${f.rt||""}`);
    });
    const text = lines.join("\n");
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "funds.txt";
    a.click();
    URL.revokeObjectURL(url);
}

// 导入区域折叠
function toggleImport() {
    const h = document.querySelector('.collapse-header');
    const b = document.getElementById('importBody');
    h.classList.toggle('collapsed');
    b.classList.toggle('collapsed');
}

// 单个基金卡片折叠/展开切换
function toggleFundCollapse(index) {
    fundList[index].collapsed = !fundList[index].collapsed;
    saveFunds();
    renderFunds();
    renderTotal();
}

// ========== 排序功能 ==========
// 1. 按基金名称升序
function sortByName() {
    fundList.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
    updateAndRender();
}

// 2. 按实时估值倒序（涨幅从高到低）
function sortByRtDesc() {
    fundList.sort((a, b) => {
        const rtA = parseFloat(a.rt) || 0;
        const rtB = parseFloat(b.rt) || 0;
        return rtB - rtA;
    });
    updateAndRender();
}

// ========== 支持导入实时估值(%) ==========
function importFunds() {
    const text = document.getElementById("importText").value.trim();
    if (!text) return alert("请粘贴内容");

    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    const newList = [];

    lines.forEach((line, idx) => {
        const parts = line.split(/\t|,| {2,}/).map(i => i.trim()).filter(i => i);
        if (parts.length < 5) return;
        if (idx === 0 && !/^\d{6}$/.test(parts[0])) return;

        const code = parts[0];
        const name = parts[1];
        const amount = parseFloat(parts[2]) || 0;
        const income = parseFloat(parts[3]) || 0;
        const lastNet = parseFloat(parts[4]) || null;
        const rt = parts[5] || "";

        newList.push({
            code, name, amount, income, lastNet, rt,
            addAmount: 0, collapsed: false
        });
    });

    fundList = newList;
    saveFunds();
    renderFunds();
    renderTotal();

    document.getElementById("importText").value = "";
    const h = document.querySelector('.collapse-header');
    const b = document.getElementById('importBody');
    h.classList.add('collapsed');
    b.classList.add('collapsed');

    alert(`导入成功：${fundList.length} 只基金`);
}

// 补仓计算逻辑
function calcFund(f) {
    const totalCost = f.amount - f.income;
    const share = f.lastNet ? f.amount / f.lastNet : 0;
    const costPrice = share ? totalCost / share : 0;

    const holdingRate = totalCost ? (f.income / totalCost * 100) : 0;
    const rt = parseFloat(f.rt) || 0;
    const todayNet = f.lastNet ? f.lastNet * (1 + rt / 100) : 0;
    const todayProfit = share * (todayNet - f.lastNet);

    const totalIncomeToday = f.income + todayProfit;
    const estimateHoldingRate = totalCost ? (totalIncomeToday / totalCost * 100) : 0;
    const latestNet = todayNet || f.lastNet || 0;

    const addAmount = parseFloat(f.addAmount) || 0;
    const addShare = latestNet ? addAmount / latestNet : 0;
    const newTotalCost = totalCost + addAmount;
    const newShare = share + addShare;
    const newCost = newShare ? newTotalCost / newShare : 0;
    const backRise = latestNet ? ((newCost - latestNet) / latestNet * 100) : 0;

    return { 
        totalCost, share, costPrice, holdingRate,
        todayNet, todayProfit, estimateHoldingRate,
        newCost, backRise 
    };
}

// 渲染基金列表
function renderFunds() {
    const container = document.getElementById("fundContainer");
    const listEl = document.getElementById("fundList");
    if (fundList.length === 0) {
        listEl.style.display = "none";
        return;
    }
    listEl.style.display = "block";

    let html = "";
    fundList.forEach((f, index) => {
        const c = calcFund(f);
        const profitCls = c.todayProfit >= 0 ? "positive" : "negative";
        const backCls = c.backRise >= 0 ? "negative" : "positive";
        const holdRateCls = c.holdingRate >= 0 ? "positive" : "negative";
        const estiRateCls = c.estimateHoldingRate >= 0 ? "positive" : "negative";
        const contentCollapsedCls = f.collapsed ? "collapsed" : "";
        const cardCollapsedCls = f.collapsed ? "fund-collapsed" : "";
        const collapseBtnText = f.collapsed ? "展开" : "收起";

        html += `
        <div class="fund-card ${cardCollapsedCls}">
            <div class="fund-title">
                <span>${f.code} | ${f.name}</span>
                <button class="fund-collapse-btn" onclick="toggleFundCollapse(${index})">${collapseBtnText}</button>
            </div>

            <div class="fund-content ${contentCollapsedCls}">
                <div class="grid">
                    <div class="item"><span class="label">持仓金额</span><span class="value">${f.amount.toFixed(2)}</span></div>
                    <div class="item">
                        <span class="label">持仓收益</span>
                        <span class="value ${f.income >=0 ? 'positive' : 'negative'}">
                            ${f.income.toFixed(2)} 
                            <span class="${holdRateCls}">(${c.holdingRate.toFixed(2)}%)</span>
                        </span>
                    </div>
                    <div class="item"><span class="label">总成本</span><span class="value">${c.totalCost.toFixed(2)}</span></div>
                    <div class="item"><span class="label">持有份额</span><span class="value">${c.share.toFixed(2)}</span></div>
                    <div class="item"><span class="label">持仓成本</span><span class="value">${c.costPrice.toFixed(4)}</span></div>
                    <div class="item"><span class="label">昨日净值</span><span class="value">${f.lastNet ? f.lastNet.toFixed(4) : '未设置'}</span></div>
                </div>

                <div class="input-item">
                    <span class="label">实时估值(%)</span>
                    <input type="text" value="${f.rt}" 
                        oninput="fundList[${index}].rt=this.value" 
                        onkeydown="if(event.key==='Enter')updateAndRender()"
                        placeholder="输入后按回车">
                </div>

                <div class="grid">
                    <div class="item">
                        <span class="label">今日净值</span>
                        <span class="value">
                            ${c.todayNet.toFixed(4)} 
                            <span class="${estiRateCls}">(${c.estimateHoldingRate.toFixed(2)}%)</span>
                        </span>
                    </div>
                    <div class="item"><span class="label">今日盈亏</span><span class="value ${profitCls}">${c.todayProfit.toFixed(2)}</span></div>
                </div>

                <div class="input-item">
                    <span class="label">补仓金额</span>
                    <input type="number" value="${f.addAmount}" 
                        oninput="fundList[${index}].addAmount=this.value" 
                        onkeydown="if(event.key==='Enter')updateAndRender()"
                        placeholder="输入后按回车">
                </div>

                <div class="grid">
                    <div class="item"><span class="label">补仓成本</span><span class="value">${c.newCost.toFixed(4)}</span></div>
                    <div class="item"><span class="label">回本需涨</span><span class="value ${backCls}">${c.backRise.toFixed(2)}%</span></div>
                </div>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

// ========== 渲染总计 ==========
function renderTotal() {
    const totalEl = document.getElementById("totalContainer");
    if (fundList.length === 0) {
        totalEl.innerHTML = "";
        return;
    }

    let totalAmount = 0;
    let totalCost = 0;
    let totalIncome = 0;
    let totalTodayProfit = 0;
    let totalShare = 0;

    fundList.forEach(f => {
        const c = calcFund(f);
        totalAmount += f.amount;
        totalCost += c.totalCost;
        totalIncome += f.income;
        totalTodayProfit += c.todayProfit;
        totalShare += c.share;
    });

    const totalAllProfit = totalIncome + totalTodayProfit;
    const totalRate = totalCost ? (totalAllProfit / totalCost * 100) : 0;
    const todayCls = totalTodayProfit >= 0 ? "positive" : "negative";
    const totalCls = totalAllProfit >= 0 ? "positive" : "negative";

    totalEl.innerHTML = `
    <div class="total-card">
        <div class="total-title">📊 持仓总计</div>
        <div class="grid">
            <div class="item"><span class="label">总持仓金额</span><span class="value">${totalAmount.toFixed(2)}</span></div>
            <div class="item"><span class="label">总成本</span><span class="value">${totalCost.toFixed(2)}</span></div>
            <div class="item"><span class="label">今日盈亏总计</span><span class="value ${todayCls}">${totalTodayProfit.toFixed(2)}</span></div>
            <div class="item"><span class="label">总收益(含今日)</span><span class="value ${totalCls}">${totalAllProfit.toFixed(2)}</span></div>
            <div class="item"><span class="label">总收益率</span><span class="value ${totalCls}">${totalRate.toFixed(2)}%</span></div>
        </div>
    </div>`;
}

// 初始化
renderFunds();
renderTotal();
</script>
</body>
</html>
